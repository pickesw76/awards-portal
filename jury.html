<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>AIA Mississippi 2026 Design Awards — Jury Review</title>
  <style>
    :root { --aia-red:#E74C3C; --aia-red-dark:#c0392b; --bg:#f4f4f6; --card:#fff; --border:#ddd; --muted:#666; --success:#2e7d32; --warn:#b35c00; --error:#c62828; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg); color: #333; margin: 0; }
    a { color: var(--aia-red); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header.topbar { background: var(--aia-red); color: #fff; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; }
    header.topbar .mark { font-size: 11px; letter-spacing: 3px; font-weight: 700; opacity: 0.9; }
    header.topbar h1 { margin: 0; font-size: 18px; font-weight: 700; }
    header.topbar .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    header.topbar .signout { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }
    .anonymous-banner { background: #fff3cd; border: 1px solid #ffc107; border-left: 4px solid #ffc107; color: var(--warn); padding: 12px 16px; border-radius: 4px; font-size: 13px; margin-bottom: 16px; }

    .filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .filters select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; background: #fff; }

    .entries-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .entry-card { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 16px; cursor: pointer; transition: all 0.15s ease; }
    .entry-card:hover { border-color: var(--aia-red); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .entry-card .num { display: inline-block; background: var(--aia-red); color: #fff; padding: 3px 10px; border-radius: 3px; font-size: 12px; font-weight: 700; }
    .entry-card .title { font-size: 16px; font-weight: 600; margin: 10px 0 6px 0; }
    .entry-card .categories { color: var(--muted); font-size: 12px; }
    .entry-card .badges { margin-top: 10px; }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; margin-right: 4px; }
    .badge-cote { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-header { background: var(--aia-red); color: #fff; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; }
    .modal-header h2 { margin: 0; font-size: 16px; }
    .modal-header .close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
    .modal-body { padding: 20px; }
    .file-list { list-style: none; padding: 0; margin: 0; }
    .file-list li { padding: 10px 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .file-list li:last-child { border-bottom: none; }
    .btn { padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; text-decoration: none; display: inline-block; background: var(--aia-red); color: #fff; }
    .btn:hover { background: var(--aia-red-dark); }

    /* Login */
    .login-shell { max-width: 420px; margin: 80px auto; }
    .login-shell .card { padding: 32px; text-align: center; background: #fff; border: 1px solid var(--border); border-radius: 6px; }
    .login-shell h2 { color: var(--aia-red); margin: 8px 0 18px 0; font-size: 22px; }
    .login-shell p { color: var(--muted); margin-bottom: 20px; font-size: 14px; }
    .login-shell input[type="email"] { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; margin-bottom: 12px; }
    .login-shell button { width: 100%; padding: 11px 14px; background: var(--aia-red); color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .login-shell button:disabled { opacity: 0.6; }
    .login-shell .msg { margin-top: 14px; font-size: 13px; }
    .login-shell .msg.success { color: var(--success); }
    .login-shell .msg.error { color: var(--error); }

    footer.sitefoot { max-width: 1200px; margin: 30px auto 0; padding: 20px 16px 40px; text-align: center; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner { width: 28px; height: 28px; border: 3px solid #eee; border-top-color: var(--aia-red); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast-area { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: #333; color: #fff; padding: 12px 18px; border-radius: 4px; font-size: 13px; }
    .toast.error { background: var(--error); }
  </style>
</head>
<body>
  <div class="toast-area" id="toastArea"></div>

  <header class="topbar">
    <div>
      <div class="mark">AIA MISSISSIPPI</div>
      <h1>2026 Design Awards · Jury Review</h1>
    </div>
    <div class="user-info" id="userInfo" style="display:none;">
      <span id="userEmail"></span>
      <button class="signout" id="signoutBtn">Sign out</button>
    </div>
  </header>

  <div class="wrap">
    <div id="app"><div class="loading"><div class="spinner"></div><p>Loading…</p></div></div>
  </div>

  <footer class="sitefoot">
    <p style="margin:0;"><strong>AIA Mississippi</strong> — The American Institute of Architects, Mississippi Chapter</p>
    <p style="margin:6px 0 0 0;"><a href="https://www.aiamississippi.org">www.aiamississippi.org</a> · <a href="mailto:steve@aiamississippi.org">steve@aiamississippi.org</a></p>
  </footer>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header"><h2 id="modalTitle">Entry detail</h2><button class="close" id="modalClose">&times;</button></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://nommsulegpmbucgsavxh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_09-YvbXHvlkyw13020vipg_bEJZt-nJ";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

    const state = { entries: [], filterCategory: "" };

    function escapeHtml(s) { return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
    function fmtBytes(n) { if (n == null) return ""; if (n < 1024*1024) return `${(n/1024).toFixed(1)} KB`; return `${(n/1024/1024).toFixed(1)} MB`; }
    function pad2(n) { return String(n).padStart(2, "0"); }
    function toast(msg, kind = "") { const el = document.createElement("div"); el.className = "toast " + kind; el.textContent = msg; document.getElementById("toastArea").appendChild(el); setTimeout(() => el.remove(), 4500); }

    function renderLogin(message = null, kind = "") {
      document.getElementById("userInfo").style.display = "none";
      document.getElementById("app").innerHTML = `
        <div class="login-shell"><div class="card">
          <h2>Jury Sign In</h2>
          <p>Enter your email — we'll send you a one-time login link.<br>Only assigned jury members can access this review.</p>
          <input type="email" id="emailInput" placeholder="you@example.com" />
          <button id="sendLinkBtn">Email me a login link</button>
          <div class="msg ${kind}" id="loginMsg">${message ?? ""}</div>
        </div></div>
      `;
      document.getElementById("emailInput").focus();
      document.getElementById("emailInput").addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("sendLinkBtn").click(); });
      document.getElementById("sendLinkBtn").addEventListener("click", async () => {
        const email = document.getElementById("emailInput").value.trim();
        const btn = document.getElementById("sendLinkBtn");
        const msg = document.getElementById("loginMsg");
        if (!email) return;
        btn.disabled = true; btn.textContent = "Sending…";
        try {
          const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href.split("#")[0] } });
          if (error) throw error;
          msg.className = "msg success";
          msg.textContent = "Check your email — click the link to sign in.";
        } catch (e) {
          msg.className = "msg error";
          msg.textContent = e.message || "Could not send link.";
        } finally {
          btn.disabled = false; btn.textContent = "Email me a login link";
        }
      });
    }

    function renderDashboard() {
      const allCategories = Array.from(new Set(state.entries.flatMap(e => e.categories || []))).sort();
      const categoryOpts = allCategories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

      const filtered = state.entries.filter(e => !state.filterCategory || (e.categories || []).includes(state.filterCategory));

      document.getElementById("app").innerHTML = `
        <div class="anonymous-banner">
          <strong>Anonymous Jury View.</strong> Firm names and identifying information have been removed. You see only the anonymous board, the presentation (without credits), and the 5 hi-res images for each entry.
        </div>
        <div class="filters">
          <select id="filterCategory">
            <option value="">All categories (${state.entries.length})</option>
            ${categoryOpts}
          </select>
          <span style="font-size:13px;color:var(--muted);">Showing ${filtered.length} entries</span>
        </div>
        <div class="entries-grid" id="grid">
          ${filtered.map(e => `
            <div class="entry-card" data-id="${e.id}">
              <span class="num">Entry #${pad2(e.entry_number)}</span>
              <div class="title">${escapeHtml(e.project_title)}</div>
              <div class="categories">${(e.categories || []).map(escapeHtml).join(" · ")}</div>
              <div class="badges">${e.cote_award ? '<span class="badge badge-cote">COTE</span>' : ""}</div>
            </div>
          `).join("")}
        </div>
      `;
      document.getElementById("filterCategory").addEventListener("change", (e) => { state.filterCategory = e.target.value; renderDashboard(); });
      document.querySelectorAll(".entry-card").forEach(c => c.addEventListener("click", () => openDetail(c.dataset.id)));
    }

    async function openDetail(submissionId) {
      const overlay = document.getElementById("modalOverlay");
      const body = document.getElementById("modalBody");
      const title = document.getElementById("modalTitle");
      body.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading…</p></div>`;
      overlay.classList.add("open");
      try {
        const { data, error } = await supabase.rpc("jury_get_submission", { p_id: submissionId });
        if (error) throw new Error(error.message);
        const ee = pad2(data.entry_number);
        title.textContent = `Entry #${ee} — ${data.project_title}`;
        const filesByslot = {};
        (data.files || []).forEach(f => { filesByslot[f.file_slot] = f; });

        const slotOrder = [
          { key: "presentation", label: "Presentation (PDF)" },
          { key: "board", label: "Anonymous Board (PDF)" },
          { key: "image1", label: "Image 1 (JPEG)" }, { key: "image2", label: "Image 2 (JPEG)" },
          { key: "image3", label: "Image 3 (JPEG)" }, { key: "image4", label: "Image 4 (JPEG)" }, { key: "image5", label: "Image 5 (JPEG)" }
        ];

        body.innerHTML = `
          <p style="margin:0 0 14px 0;"><strong>Categories:</strong> ${(data.categories || []).map(escapeHtml).join(", ")}${data.cote_award ? ' &nbsp;<span class="badge badge-cote">COTE</span>' : ""}</p>
          <ul class="file-list">
            ${slotOrder.map(slot => {
              const f = filesByslot[slot.key];
              if (!f) return `<li><span style="color:#aaa;font-style:italic;">${slot.label} — not uploaded</span></li>`;
              return `<li><span>${slot.label} <span style="color:var(--muted);font-size:11px;">${fmtBytes(f.file_size)}</span></span><button class="btn" data-path="${escapeHtml(f.storage_path)}" data-name="${ee}-${slot.key.startsWith('image') ? slot.key.replace('image','Image')+'.jpeg' : (slot.key === 'board' ? 'Board.pdf' : 'Presentation.pdf')}">Download</button></li>`;
            }).join("")}
          </ul>
          <p style="font-size:11px;color:var(--muted);margin-top:14px;">Download links expire after 10 minutes.</p>
        `;
        body.querySelectorAll("button[data-path]").forEach(b => b.addEventListener("click", () => downloadFile(b.dataset.path, b.dataset.name)));
      } catch (e) {
        body.innerHTML = `<div style="color:var(--error);">Error: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function downloadFile(path, filename) {
      try {
        const { data, error } = await supabase.storage.from("submissions").createSignedUrl(path, 600, { download: filename });
        if (error) throw new Error(error.message);
        window.open(data.signedUrl, "_blank");
      } catch (e) {
        toast("Download failed: " + (e.message || e), "error");
      }
    }

    document.getElementById("modalClose").addEventListener("click", () => document.getElementById("modalOverlay").classList.remove("open"));
    document.getElementById("modalOverlay").addEventListener("click", (e) => { if (e.target.id === "modalOverlay") document.getElementById("modalOverlay").classList.remove("open"); });

    async function loadEntries() {
      const { data, error } = await supabase.rpc("jury_list_submissions");
      if (error) {
        if (error.code === "P0001" || error.message.includes("forbidden")) {
          await supabase.auth.signOut();
          renderLogin("Your email isn't on the jury allowlist. Contact steve@aiamississippi.org.", "error");
          return;
        }
        toast("Could not load entries: " + error.message, "error");
        return;
      }
      state.entries = data || [];
      renderDashboard();
    }

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { renderLogin(); return; }
      document.getElementById("userInfo").style.display = "flex";
      document.getElementById("userEmail").textContent = session.user.email;
      document.getElementById("signoutBtn").addEventListener("click", async () => { await supabase.auth.signOut(); location.reload(); });
      await loadEntries();
    }

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_IN" && session) {
        if (location.hash) history.replaceState(null, "", location.pathname);
        init();
      }
    });

    init();
  </script>
</body>
</html>
